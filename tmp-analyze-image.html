<!doctype html><html><body><pre id="out">pending</pre><script>
(async () => {
  const out = document.getElementById('out');
  const img = new Image();
  img.src = '/catan_image.jpeg';
  await img.decode();
  const canvas = document.createElement('canvas');
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  const {width:w, height:h} = canvas;
  const data = ctx.getImageData(0,0,w,h).data;
  let minX=w,minY=h,maxX=0,maxY=0,count=0;
  let seaMinX=w,seaMinY=h,seaMaxX=0,seaMaxY=0,seaCount=0;
  for (let y=0; y<h; y++) {
    for (let x=0; x<w; x++) {
      const i=(y*w+x)*4;
      const r=data[i], g=data[i+1], b=data[i+2];
      const light = (r+g+b)/3;
      if (light < 235) {
        if (x<minX) minX=x; if (y<minY) minY=y; if (x>maxX) maxX=x; if (y>maxY) maxY=y; count++;
      }
      if (b > g + 10 && g > r + 5 && b > 95) {
        if (x<seaMinX) seaMinX=x; if (y<seaMinY) seaMinY=y; if (x>seaMaxX) seaMaxX=x; if (y>seaMaxY) seaMaxY=y; seaCount++;
      }
    }
  }
  out.textContent = JSON.stringify({w,h,all:{minX,minY,maxX,maxY,count},sea:{seaMinX,seaMinY,seaMaxX,seaMaxY,seaCount}});
})();
</script></body></html>
